<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<title>Meu Treino</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --orange:#E8541A;--bg:#0f0f0f;--bg2:#181818;--bg3:#222;
  --border:#2a2a2a;--text:#f0f0f0;--muted:#666;
  --green:#3ecf6a;--blue:#4a9eff;--yellow:#f5c842;--purple:#c77dff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  padding-bottom:calc(70px + env(safe-area-inset-bottom));overscroll-behavior:none;}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);
  border-bottom:1px solid var(--border);padding:14px 20px 10px;
  padding-top:calc(14px + env(safe-area-inset-top));}
.topbar h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--orange);}
.topbar p{font-size:11px;color:var(--muted);margin-top:1px;}
/* WEEK TABS */
.week-tabs{display:flex;gap:6px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none;}
.week-tabs::-webkit-scrollbar{display:none;}
.week-tab{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:6px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;}
.week-tab.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600;}
/* PROGRESS */
.progress-wrap{padding:14px 20px 4px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;}
.progress-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--orange);border-radius:4px;transition:width .4s;}
/* DAYS */
.days{padding:16px 16px 20px;display:flex;flex-direction:column;gap:12px;}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;}
.day-card.done{border-color:var(--green);}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.day-pill{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;flex-shrink:0;}
.pill-forca{background:#2a1a0a;color:#ffb347;}
.pill-corrida{background:#0a1e2a;color:var(--blue);}
.pill-hibrido{background:#1a0a2a;color:var(--purple);}
.pill-descanso{background:#1a1a1a;color:var(--muted);}
.day-title{font-weight:600;font-size:15px;}
.day-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.chevron{color:var(--muted);font-size:18px;transition:transform .25s;margin-left:auto;flex-shrink:0;}
.day-card.open .chevron{transform:rotate(180deg);}
.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  background:transparent;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;font-size:13px;color:transparent;}
.day-card.done .check-btn{background:var(--green);border-color:var(--green);color:#fff;}
/* BODY */
.day-body{display:none;padding:0 16px 16px;}
.day-card.open .day-body{display:block;}
.section-label{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--orange);text-transform:uppercase;margin:14px 0 8px;}
/* EXERCISE ROW */
.exercise-row{border-radius:10px;background:var(--bg3);margin-bottom:6px;overflow:hidden;}
.ex-top{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;}
.ex-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);
  background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;
  transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;}
.ex-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
.ex-info{flex:1;}
.ex-name{font-size:14px;font-weight:500;}
.ex-name.checked-text{text-decoration:line-through;color:var(--muted);}
.ex-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-badge{font-size:10px;font-weight:600;letter-spacing:.5px;padding:2px 8px;border-radius:20px;flex-shrink:0;align-self:flex-start;margin-top:2px;}
.badge-pause{background:#1a1a2a;color:#8899ff;}
.badge-dist{background:#0a1a10;color:var(--green);}
.badge-tempo{background:#1a1500;color:var(--yellow);}
/* WEIGHT LOG */
.weight-row{display:flex;align-items:center;gap:8px;padding:0 12px 10px;border-top:1px solid var(--border);}
.weight-label{font-size:11px;color:var(--muted);flex-shrink:0;}
.weight-input{background:#111;border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;padding:5px 10px;width:80px;text-align:center;
  font-family:'DM Sans',sans-serif;}
.weight-input:focus{outline:none;border-color:var(--orange);}
.weight-sugg{font-size:11px;color:var(--green);flex:1;}
/* TIP */
.tip-box{background:#1a1200;border:1px solid #3a2e00;border-radius:10px;
  padding:10px 12px;margin-top:10px;font-size:12px;color:#c9a84c;line-height:1.5;}
.tip-box b{color:var(--yellow);}
/* RUN BLOCK */
.run-block{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:6px;}
.run-block-title{font-size:13px;font-weight:600;margin-bottom:6px;}
.run-detail{font-size:12px;color:var(--muted);line-height:1.6;}
.run-detail span{color:var(--text);font-weight:500;}
/* LEGEND */
.legend{position:fixed;bottom:0;left:0;right:0;background:var(--bg);
  border-top:1px solid var(--border);padding:10px 20px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:16px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
</style>
</head>

// ── STATE ──────────────────────────────────────────────────────────────
let currentWeek = parseInt(localStorage.getItem('cw')||'1');

function sk(w,d,i){ return `t_w${w}_${d}_${i}`; }
function dk(w,d){ return `done_w${w}_${d}`; }
function wk(w,d,i){ return `weight_w${w}_${d}_${i}`; }
function getEx(w,d,i){ return localStorage.getItem(sk(w,d,i))==='1'; }
function setEx(w,d,i,v){ localStorage.setItem(sk(w,d,i),v?'1':'0'); }
function getDone(w,d){ return localStorage.getItem(dk(w,d))==='1'; }
function setDone(w,d,v){ localStorage.setItem(dk(w,d),v?'1':'0'); }
function getWeight(w,d,i){ return localStorage.getItem(wk(w,d,i))||''; }
function saveWeight(w,d,i,v){ localStorage.setItem(wk(w,d,i),v); }
// get previous week's weight
function prevWeight(w,d,i){ return w>1?localStorage.getItem(wk(w-1,d,i))||'':''; }

function badgeHTML(b){
  if(!b)return'';
  if(b==='dist')return'<span class="ex-badge badge-dist">km</span>';
  if(b==='tempo')return'<span class="ex-badge badge-tempo">⏱</span>';
  return`<span class="ex-badge badge-pause">⏸ ${b}</span>`;
}

function renderRunDay(dayData, dayKey, w){
  const isDone = getDone(w, dayKey);
  const card = document.createElement('div');
  card.className='day-card'+(isDone?' done':'');
  card.id=`card-${dayKey}`;

  const bodyHTML=`
    <div class="section-label">Sessão</div>
    <div class="run-block">
      <div class="run-block-title">🔥 Aquecimento</div>
      <div class="run-detail">${dayData.warmup}</div>
    </div>
    <div class="run-block" style="border:1px solid #1a3a1a;background:#0a1a0a">
      <div class="run-block-title" style="color:var(--green)">🏃 ${dayData.intervals||dayData.main}</div>
      <div class="run-detail">Ritmo: <span>${dayData.pace}</span>${dayData.rest?'<br>Descanso: <span>'+dayData.rest+'</span>':''}</div>
    </div>
    <div class="run-block">
      <div class="run-block-title">❄️ Desaquecimento</div>
      <div class="run-detail">${dayData.cooldown}</div>
    </div>
    ${dayData.tip?`<div class="tip-box">💡 ${dayData.tip}</div>`:''}
  `;

  card.innerHTML=`
    <div class="day-header" onclick="toggleCard('${dayKey}')">
      <button class="check-btn" onclick="toggleDone('${dayKey}',event)">${isDone?'✓':''}</button>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="day-pill pill-${dayData.pill}">${dayData.pillLabel}</span>
        </div>
        <div class="day-title" style="margin-top:4px">${dayData.label||labelFor(dayKey)}</div>
        <div class="day-meta">${dayData.meta}</div>
      </div>
      <span class="chevron">⌄</span>
    </div>
    <div class="day-body">${bodyHTML}</div>`;
  return card;
}

function labelFor(k){ return{seg:'Segunda',ter:'Terça',qua:'Quarta',qui:'Quinta',sex:'Sexta'}[k]||k; }

function renderStrengthDay(dayData, dayKey, w){
  const isDone = getDone(w, dayKey);
  const card = document.createElement('div');
  card.className='day-card'+(isDone?' done':'');
  card.id=`card-${dayKey}`;

  let exGlobal=0;
  let sectionsHTML='';
  dayData.sections.forEach(sec=>{
    sectionsHTML+=`<div class="section-label">${sec.title}</div>`;
    sec.items.forEach((ex,li)=>{
      const gi=exGlobal++;
      const checked=getEx(w,dayKey,gi);
      const hasWeight=!!ex.logWeight;
      const savedW=getWeight(w,dayKey,gi);
      const prevW=prevWeight(w,dayKey,gi);
      let weightHTML='';
      if(hasWeight){
        const suggText = prevW ? `Semana passada: ${prevW} kg` : (ex.target||'');
        weightHTML=`
          <div class="weight-row">
            <span class="weight-label">⚖️ Carga usada:</span>
            <input class="weight-input" type="number" inputmode="decimal" placeholder="kg"
              value="${savedW}" onchange="saveWeightVal(${w},'${dayKey}',${gi},this.value)">
            <span class="weight-sugg">${suggText}</span>
          </div>`;
      }
      sectionsHTML+=`
        <div class="exercise-row">
          <div class="ex-top">
            <div class="ex-check${checked?' checked':''}" onclick="toggleEx('${dayKey}',${gi},this,event)">${checked?'✓':''}</div>
            <div class="ex-info">
              <div class="ex-name${checked?' checked-text':''}">${ex.name}</div>
              <div class="ex-detail">${ex.detail}</div>
            </div>
            ${badgeHTML(ex.badge||null)}
          </div>
          ${weightHTML}
        </div>`;
    });
  });
  const tipHTML=dayData.tip?`<div class="tip-box">💡 ${dayData.tip}</div>`:'';

  card.innerHTML=`
    <div class="day-header" onclick="toggleCard('${dayKey}')">
      <button class="check-btn" onclick="toggleDone('${dayKey}',event)">${isDone?'✓':''}</button>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="day-pill pill-${dayData.pill}">${dayData.pillLabel}</span>
        </div>
        <div class="day-title" style="margin-top:4px">${labelFor(dayKey)}</div>
        <div class="day-meta">${dayData.meta}</div>
      </div>
      <span class="chevron">⌄</span>
    </div>
    <div class="day-body">${sectionsHTML}${tipHTML}</div>`;
  return card;
}

function renderRestDay(w){
  const isDone=getDone(w,'sab');
  const card=document.createElement('div');
  card.className='day-card'+(isDone?' done':'');
  card.id='card-sab';
  card.innerHTML=`
    <div class="day-header" onclick="toggleCard('sab')">
      <button class="check-btn" onclick="toggleDone('sab',event)">${isDone?'✓':''}</button>
      <div style="flex:1">
        <span class="day-pill pill-descanso">DESCANSO</span>
        <div class="day-title" style="margin-top:4px">Sáb / Dom</div>
        <div class="day-meta">Recuperação ativa</div>
      </div>
      <span class="chevron">⌄</span>
    </div>
    <div class="day-body">
      <div class="tip-box" style="margin-top:4px">💡 ${DESCANSO.tip}</div>
    </div>`;
  return card;
}

function render(){
  // tabs
  const tabsEl=document.getElementById('week-tabs');
  tabsEl.innerHTML='';
  for(let w=1;w<=8;w++){
    const t=document.createElement('div');
    t.className='week-tab'+(w===currentWeek?' active':'');
    t.textContent=`Sem. ${w}`;
    t.onclick=()=>{ currentWeek=w; localStorage.setItem('cw',w); render(); };
    tabsEl.appendChild(t);
  }

  const wData=PLAN[currentWeek-1];
  const container=document.getElementById('days-container');
  container.innerHTML='';

  // Week label
  const wLabel=document.createElement('div');
  wLabel.style.cssText='font-size:12px;color:var(--orange);font-weight:600;letter-spacing:.5px;padding:0 4px 4px';
  wLabel.textContent=`SEMANA ${currentWeek} — ${wData.label}`;
  container.appendChild(wLabel);

  const DAYKEYS=['seg','ter','qua','qui','sex'];
  let doneDays=0;
  DAYKEYS.forEach(k=>{
    if(getDone(currentWeek,k)) doneDays++;
    const d=wData[k];
    let card;
    if(d.type==='run') card=renderRunDay(d,k,currentWeek);
    else card=renderStrengthDay(d,k,currentWeek);
    container.appendChild(card);
  });
  container.appendChild(renderRestDay(currentWeek));

  const pct=Math.round(doneDays/5*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${doneDays} / 5 treinos`;
}

function toggleCard(key){
  const c=document.getElementById(`card-${key}`);
  c.classList.toggle('open');
}
function toggleDone(key,e){
  e.stopPropagation();
  setDone(currentWeek,key,!getDone(currentWeek,key));
  render();
}
function toggleEx(dayKey,idx,el,e){
  e.stopPropagation();
  const cur=getEx(currentWeek,dayKey,idx);
  setEx(currentWeek,dayKey,idx,!cur);
  el.classList.toggle('checked');
  el.textContent=!cur?'✓':'';
  el.closest('.ex-top').querySelector('.ex-name').classList.toggle('checked-text',!cur);
}
function saveWeightVal(w,dayKey,idx,val){
  saveWeight(w,dayKey,idx,val);
}

render();
</script>
</body>
</html>
